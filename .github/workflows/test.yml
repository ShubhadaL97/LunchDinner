name: Playwright Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Verify Encryption Key is set
        run: |
          if [ -z "${{ secrets.ENCRYPTION_KEY }}" ]; then
            echo "❌ ERROR: ENCRYPTION_KEY secret is not set!"
            echo "Please add it in: Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "✅ ENCRYPTION_KEY secret is configured"

      - name: Run full test suite
        run: npm test
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          HEADLESS: true

      - name: Run smoke tests
        if: always()
        run: npm run test:smoke
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          HEADLESS: true

      - name: Run authentication tests
        if: always()
        run: npm run test:auth
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          HEADLESS: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "========== TEST RUN COMPLETE =========="
          echo "Check the artifacts section for test reports"
          echo "========================================"
